<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田仲方</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            text-align: center;
            padding-top: 80px;
            background: #f5f7fa;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 30px;
            color: #2c3e50;
        }
        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #4f6ef7;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(79,110,247,0.4);
            transition: 0.2s;
        }
        button:hover { background: #3b54e0; }
        button:active { transform: scale(0.96); }

        /* 对话框遮罩 */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .dialog {
            background: white;
            border-radius: 16px;
            padding: 30px 25px;
            min-width: 280px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        .dialog p {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .dialog button {
            margin: 6px 8px;
            padding: 10px 28px;
            font-size: 1rem;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            color: white;
        }
        .btn-yes { background: #27ae60; }
        .btn-no { background: #e74c3c; }
        .result {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 20px;
            display: none;
        }
        .result.show { display: block; }
    </style>
</head>
<body>
    <h1>田仲方</h1>
    <button id="openBtn">🔍 揭晓答案</button>

    <!-- 对话框结构 -->
    <div class="overlay" id="overlay">
        <div class="dialog">
            <p>田仲方是不是gay？</p>
            <div id="questionButtons">
                <button class="btn-yes" id="btnYes">对</button>
                <button class="btn-no" id="btnNo">不对</button>
            </div>
            <div class="result" id="resultText"></div>
            <p style="font-size:0.8rem; color:#999; margin-top:15px;" id="closeHint" style="display:none;">点击遮罩关闭</p>
        </div>
    </div>

    <script>
        // 等待页面完全加载后再绑定事件
        window.onload = function() {
            var overlay = document.getElementById('overlay');
            var openBtn = document.getElementById('openBtn');
            var btnYes = document.getElementById('btnYes');
            var btnNo = document.getElementById('btnNo');
            var resultText = document.getElementById('resultText');
            var closeHint = document.getElementById('closeHint');
            var questionButtons = document.getElementById('questionButtons');

            // 打开对话框
            openBtn.onclick = function() {
                overlay.style.display = 'flex';
                // 重置对话框状态
                questionButtons.style.display = 'block';
                resultText.classList.remove('show');
                closeHint.style.display = 'none';
            };

            // 点击“对”
            btnYes.onclick = function() {
                questionButtons.style.display = 'none';
                resultText.innerHTML = '啊对对 🎉';
                resultText.style.color = '#27ae60';
                resultText.classList.add('show');
                closeHint.style.display = 'block';
            };

            // 点击“不对”
            btnNo.onclick = function() {
                questionButtons.style.display = 'none';
                resultText.innerHTML = '你是gay 😏';
                resultText.style.color = '#e74c3c';
                resultText.classList.add('show');
                closeHint.style.display = 'block';
            };

            // 点击遮罩关闭
            overlay.onclick = function(e) {
                if (e.target === overlay) {
                    overlay.style.display = 'none';
                }
            };

            // 按ESC关闭
            document.onkeydown = function(e) {
                if (e.key === 'Escape' && overlay.style.display === 'flex') {
                    overlay.style.display = 'none';
                }
            };
        };
    </script>
</body>
</html>
